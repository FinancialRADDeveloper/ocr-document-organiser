<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Organiser</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: #f4f7f9;
            color: #333;
            padding: 2em;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background-color: #ffffff;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #1a253c;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 0.5em;
            margin-top: 0;
        }

        /* ── Upload area ── */
        .upload-container {
            margin-bottom: 2em;
            padding: 1.5em;
            background-color: #f8f9fa;
            border: 2px dashed #d1d9e0;
            border-radius: 8px;
            text-align: center;
        }

        .upload-container h2 { margin-top: 0; color: #1a253c; }

        .upload-container input[type="file"] { margin-bottom: 1em; display: block; margin: 0 auto 1em; }

        .upload-container button {
            background-color: #1a253c;
            color: #fff;
            border: none;
            padding: 0.6em 1.4em;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-container button:hover { background-color: #2d3f63; }

        /* ── Status log ── */
        .status-container {
            margin-top: 2em;
            padding: 1em;
            background-color: #eef1f4;
            border-radius: 8px;
            display: none;
        }

        .status-container h2 { margin-top: 0; color: #1a253c; }

        #status-log {
            list-style-type: none;
            padding: 10px;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85em;
            background-color: #fff;
            border-radius: 4px;
        }

        #status-log li { padding: 2px 0; }
        #status-log li.error { color: #c0392b; }

        /* Spinner — shown while processing */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #aaa;
            border-top-color: #1a253c;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #processing-indicator {
            display: flex;
            align-items: center;
            font-size: 0.9em;
            color: #555;
            margin-bottom: 8px;
        }

        #processing-indicator.hidden { display: none; }

        /* ── Summary banner ── */
        #summary-banner {
            display: none;
            margin-top: 1.5em;
            padding: 1em 1.4em;
            border-radius: 6px;
            background-color: #eafaf1;
            border-left: 4px solid #27ae60;
            color: #1e7e44;
        }

        #summary-banner.has-errors {
            background-color: #fdf3f2;
            border-left-color: #c0392b;
            color: #7b241c;
        }

        #summary-banner .summary-row {
            display: flex;
            gap: 2em;
            flex-wrap: wrap;
            align-items: center;
        }

        #summary-banner .summary-item { font-size: 0.95em; }
        #summary-banner .summary-item strong { font-size: 1.1em; }

        /* ── Results header ── */
        #results-header {
            color: #1a253c;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 0.5em;
            margin-top: 1.5em;
        }

        /* ── Cards grid ── */
        #results-container { margin-top: 0; }

        .results-placeholder { color: #666; font-style: italic; margin-top: 1.5em; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1em;
            margin-top: 1.2em;
        }

        .doc-card {
            background: #fff;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            padding: 1.1em 1.2em;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 0.5em;
            transition: box-shadow 0.15s;
        }

        .doc-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }

        .doc-card.failed {
            border-left: 4px solid #e74c3c;
            background: #fff8f8;
        }

        .doc-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5em;
        }

        .doc-icon { font-size: 1.6em; line-height: 1; flex-shrink: 0; }

        .badge {
            font-size: 0.7em;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 0.25em 0.6em;
            border-radius: 12px;
            white-space: nowrap;
        }

        .badge-success {
            background-color: #d4edda;
            color: #155724;
        }

        .badge-failed {
            background-color: #f8d7da;
            color: #721c24;
        }

        .doc-type-label {
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #7f8c8d;
        }

        .doc-new-name {
            font-size: 0.9em;
            font-weight: 600;
            color: #1a253c;
            word-break: break-all;
            line-height: 1.4;
        }

        .doc-original-name {
            font-size: 0.8em;
            color: #95a5a6;
            word-break: break-all;
        }

        .doc-original-name span { font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Document Organiser</h1>

        <div class="upload-container">
            <h2>Upload PDF Files</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" id="file-input" name="files[]" multiple accept=".pdf">
                <button type="submit">Upload and Process</button>
            </form>
        </div>

        <div id="status-container" class="status-container">
            <h2>Processing Status</h2>
            <div id="processing-indicator" class="hidden">
                <span class="spinner"></span> Processing files, please wait&hellip;
            </div>
            <ul id="status-log"></ul>
        </div>

        <div id="summary-banner"></div>

        <h2 id="results-header" style="display:none;">Results</h2>
        <div id="results-container">
            <p class="results-placeholder">Upload files and click "Upload and Process" to see the results.</p>
        </div>
    </div>

    <script>
        // ── Icon mapping based on document_type keywords ──
        function getDocIcon(docType) {
            if (!docType) return '📄';
            const t = docType.toLowerCase();
            if (/bank|finance|financ|payment|invoice|tax|account|mortgage|loan|credit/.test(t)) return '🏦';
            if (/health|nhs|medical|hospital|clinic|prescription|gp|doctor/.test(t)) return '🏥';
            if (/statement|summary|report/.test(t)) return '📋';
            if (/legal|policy|contract|agreement|deed|will|trust|insurance/.test(t)) return '📜';
            return '📄';
        }

        document.getElementById('upload-form').addEventListener('submit', async function(event) {
            event.preventDefault();

            const statusContainer = document.getElementById('status-container');
            const statusLog      = document.getElementById('status-log');
            const resultsContainer = document.getElementById('results-container');
            const processingIndicator = document.getElementById('processing-indicator');
            const summaryBanner  = document.getElementById('summary-banner');
            const resultsHeader  = document.getElementById('results-header');
            const fileInput      = document.getElementById('file-input');
            const formData       = new FormData();

            if (fileInput.files.length === 0) {
                alert('Please select files to upload.');
                return;
            }

            for (const file of fileInput.files) {
                formData.append('files[]', file);
            }

            // Reset UI
            statusLog.innerHTML = '';
            statusContainer.style.display = 'block';
            summaryBanner.style.display = 'none';
            summaryBanner.className = '';
            resultsContainer.innerHTML = '<p class="results-placeholder">Processing files&hellip;</p>';
            resultsHeader.style.display = 'none';
            processingIndicator.classList.remove('hidden');

            try {
                // Step 1: Upload files
                addLogLine('Uploading files...');
                const uploadResponse = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!uploadResponse.ok) {
                    throw new Error('File upload failed.');
                }
                addLogLine('Upload complete. Starting processing...');

                // Step 2: Start processing and listen for SSE events
                const eventSource = new EventSource('/process');

                eventSource.onmessage = function(e) {
                    const isError = /error|failed|exception/i.test(e.data);
                    addLogLine(e.data, isError);
                };

                eventSource.addEventListener('end', function(e) {
                    eventSource.close();
                    processingIndicator.classList.add('hidden');

                    let results;
                    try {
                        results = JSON.parse(e.data);
                    } catch(_) {
                        addLogLine('Could not parse results from server.', true);
                        return;
                    }

                    // Handle error payload (object with .error key instead of array)
                    if (!Array.isArray(results)) {
                        const errMsg = results.error || 'An unexpected error occurred.';
                        addLogLine(errMsg, true);
                        showSummary([], true);
                        return;
                    }

                    showSummary(results, false);
                    displayResults(results);
                });

                eventSource.onerror = function(err) {
                    console.error('EventSource failed:', err);
                    processingIndicator.classList.add('hidden');
                    addLogLine('A connection error occurred during processing.', true);
                    eventSource.close();
                };

            } catch (error) {
                console.error('Error:', error);
                processingIndicator.classList.add('hidden');
                addLogLine('Error: ' + error.message, true);
            }
        });

        function addLogLine(text, isError) {
            const statusLog = document.getElementById('status-log');
            const li = document.createElement('li');
            if (isError) li.className = 'error';
            li.textContent = text;
            statusLog.appendChild(li);
            statusLog.scrollTop = statusLog.scrollHeight;
        }

        function showSummary(results, hadConnectionError) {
            const banner = document.getElementById('summary-banner');
            const total     = results.length;
            const succeeded = results.filter(r => r.status === 'success').length;
            const failed    = total - succeeded;
            const timestamp = results.length > 0 ? results[results.length - 1].timestamp : new Date().toLocaleString();

            if (hadConnectionError || (total > 0 && failed === total)) {
                banner.className = 'has-errors';
            }

            banner.innerHTML = `
                <div class="summary-row">
                    <div class="summary-item">
                        ${hadConnectionError
                            ? '&#x26A0;&#xFE0F; Processing ended with a connection error.'
                            : (failed > 0
                                ? '&#x26A0;&#xFE0F; Processing complete with errors'
                                : '&#x2713; Processing complete')}
                    </div>
                    <div class="summary-item"><strong>${total}</strong> file${total !== 1 ? 's' : ''} processed</div>
                    <div class="summary-item"><strong>${succeeded}</strong> renamed successfully</div>
                    ${failed > 0 ? `<div class="summary-item"><strong>${failed}</strong> failed</div>` : ''}
                    <div class="summary-item" style="margin-left:auto; color: inherit; opacity: 0.7; font-size:0.85em;">${timestamp}</div>
                </div>
            `;
            banner.style.display = 'block';
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('results-container');
            const resultsHeader    = document.getElementById('results-header');

            if (results.length === 0) {
                resultsContainer.innerHTML = '<p class="results-placeholder">No files were successfully processed.</p>';
                return;
            }

            resultsHeader.style.display = 'block';

            const grid = document.createElement('div');
            grid.className = 'cards-grid';

            results.forEach(result => {
                const isSuccess  = result.status === 'success';
                const icon       = getDocIcon(result.document_type);
                const docType    = result.document_type || 'Document';
                const newName    = result.new_name  || result.original_name;
                const origName   = result.original_name;

                const card = document.createElement('div');
                card.className = 'doc-card' + (isSuccess ? '' : ' failed');
                card.innerHTML = `
                    <div class="doc-card-header">
                        <span class="doc-icon" aria-hidden="true">${icon}</span>
                        <span class="badge ${isSuccess ? 'badge-success' : 'badge-failed'}">
                            ${isSuccess ? 'Renamed' : 'Failed'}
                        </span>
                    </div>
                    <div class="doc-type-label">${escapeHtml(docType)}</div>
                    <div class="doc-new-name">${escapeHtml(newName)}</div>
                    <div class="doc-original-name">was: <span>${escapeHtml(origName)}</span></div>
                `;
                grid.appendChild(card);
            });

            resultsContainer.innerHTML = '';
            resultsContainer.appendChild(grid);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
