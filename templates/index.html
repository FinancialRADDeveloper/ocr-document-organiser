<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Organization Results</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: #f4f7f9;
            color: #333;
            padding: 2em;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background-color: #ffffff;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #1a253c;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 0.5em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2em;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        td code {
            background-color: #eef1f4;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .upload-container {
            margin-bottom: 2em;
            padding: 1.5em;
            background-color: #f8f9fa;
            border: 2px dashed #d1d9e0;
            border-radius: 8px;
            text-align: center;
        }
        .upload-container input[type="file"] {
            margin-bottom: 1em;
        }
        .status-container {
            margin-top: 2em;
            padding: 1em;
            background-color: #eef1f4;
            border-radius: 8px;
            display: none; /* Hidden by default */
        }
        .status-container h2 {
            margin-top: 0;
            color: #1a253c;
        }
        #status-log {
            list-style-type: none;
            padding-left: 0;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            background-color: #fff;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="upload-container">
            <h2>Upload PDF Files</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" id="file-input" name="files[]" multiple accept=".pdf">
                <button type="submit">Upload and Process</button>
            </form>
        </div>

        <div id="status-container" class="status-container">
            <h2>Processing Status</h2>
            <ul id="status-log"></ul>
        </div>

        <h1>File Organization Results</h1>
        <div id="results-container">
            <p>Upload files and click "Upload and Process" to see the results.</p>
        </div>
    </div>

    <script>
        document.getElementById('upload-form').addEventListener('submit', async function(event) {
            event.preventDefault();

            const statusContainer = document.getElementById('status-container');
            const statusLog = document.getElementById('status-log');
            const resultsContainer = document.getElementById('results-container');
            const fileInput = document.getElementById('file-input');
            const formData = new FormData();

            if (fileInput.files.length === 0) {
                alert('Please select files to upload.');
                return;
            }

            for (const file of fileInput.files) {
                formData.append('files[]', file);
            }

            // Reset UI
            statusLog.innerHTML = '';
            statusContainer.style.display = 'block';
            resultsContainer.innerHTML = '<p>Processing files...</p>';

            try {
                // Step 1: Upload files
                statusLog.innerHTML += '<li>Uploading files...</li>';
                const uploadResponse = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!uploadResponse.ok) {
                    throw new Error('File upload failed.');
                }
                statusLog.innerHTML += '<li>Upload complete. Starting processing...</li>';

                // Step 2: Start processing and listen for events
                const eventSource = new EventSource('/process');

                eventSource.onmessage = function(e) {
                    statusLog.innerHTML += `<li>${e.data}</li>`;
                    statusLog.scrollTop = statusLog.scrollHeight; // Auto-scroll
                };

                eventSource.addEventListener('end', function(e) {
                    eventSource.close();
                    const results = JSON.parse(e.data);
                    displayResults(results);
                });

                eventSource.onerror = function(err) {
                    console.error("EventSource failed:", err);
                    statusLog.innerHTML += '<li>An error occurred during processing.</li>';
                    eventSource.close();
                };

            } catch (error) {
                console.error('Error:', error);
                statusLog.innerHTML += `<li>Error: ${error.message}</li>`;
            }
        });

        function displayResults(results) {
            const resultsContainer = document.getElementById('results-container');
            if (results.length === 0) {
                resultsContainer.innerHTML = '<p>No files were successfully processed.</p>';
                return;
            }

            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Original File</th>
                        <th>New Organised File</th>
                    </tr>
                </thead>
                <tbody>
                    ${results.map(result => `
                        <tr>
                            <td><code>${result.original_name}</code></td>
                            <td><code>${result.new_name}</code></td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            resultsContainer.innerHTML = '';
            resultsContainer.appendChild(table);
        }
    </script>
</body>
</html>
